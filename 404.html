<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>הדף לא נמצא - פארק המים יבנה</title>
    <link rel="icon" type="image/png" href="images/favicon.png?v=20260616t">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Assistant', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #002244, #0066cc);
            color: #fff;
            padding: 24px;
            text-align: center;
        }
        .nf-card {
            max-width: 560px;
            width: 100%;
        }
        .nf-logo { width: 96px; height: auto; margin-bottom: 24px; filter: drop-shadow(0 6px 18px rgba(0,0,0,.3)); }
        .nf-404 { font-size: 90px; font-weight: 800; line-height: 1; letter-spacing: 2px; }
        .nf-title { font-size: 26px; font-weight: 800; margin: 12px 0 8px; }
        .nf-text { font-size: 17px; opacity: .9; line-height: 1.6; margin-bottom: 28px; }
        .nf-btn {
            display: inline-flex; align-items: center; gap: 8px;
            background: #fff; color: #003366; font-weight: 800; font-size: 17px;
            padding: 14px 30px; border-radius: 999px; text-decoration: none;
            box-shadow: 0 8px 24px rgba(0,0,0,.25); transition: transform .2s;
        }
        .nf-btn:hover { transform: translateY(-3px); }
        .nf-links { margin-top: 28px; display: flex; flex-wrap: wrap; gap: 10px 22px; justify-content: center; }
        .nf-links a { color: #cfe3ff; text-decoration: none; font-weight: 600; font-size: 15px; }
        .nf-links a:hover { color: #fff; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="nf-card">
        <img src="images/logo.png" alt="פארק המים יבנה" class="nf-logo">
        <div class="nf-404">404</div>
        <h1 class="nf-title">הדף לא נמצא</h1>
        <p class="nf-text">ייתכן שהגעת לכתובת ישנה. האתר שלנו התחדש — בוא נחזיר אותך לדף הבית.</p>
        <a href="/" class="nf-btn"><i class="fas fa-home"></i> חזרה לדף הבית</a>
        <div class="nf-links">
            <a href="/attractions">מתקנים</a>
            <a href="/events">חוגים ואירועים</a>
            <a href="/about">על הפארק</a>
            <a href="/gallery">גלריה</a>
            <a href="/contact">צור קשר</a>
        </div>
    </div>
</body>
</html>
